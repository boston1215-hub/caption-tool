<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram キャプションツール セットアップ | asChronos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --burgundy: #850025;
    --wine: #C00000;
    --light-red: #fff0f0;
    --black: #1a1a1a;
    --gray: #666;
    --light: #f8f8f8;
    --border: #e5e5e5;
    --white: #ffffff;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--light);
    color: var(--black);
    min-height: 100vh;
  }

  /* ヘッダー */
  .header {
    background: var(--white);
    border-bottom: 3px solid var(--burgundy);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .header-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--burgundy);
    letter-spacing: 0.05em;
  }
  .header-sub {
    font-size: 12px;
    color: var(--gray);
    border-left: 1px solid var(--border);
    padding-left: 1rem;
    margin-left: 0.5rem;
  }

  /* メインコンテナ */
  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
  }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--black);
    margin-bottom: 0.5rem;
  }
  .page-sub {
    font-size: 13px;
    color: var(--gray);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  /* ステッパー */
  .stepper {
    display: flex;
    align-items: center;
    margin-bottom: 2rem;
    gap: 0;
  }
  .step-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    position: relative;
  }
  .step-item:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 14px;
    left: 50%;
    width: 100%;
    height: 2px;
    background: var(--border);
    z-index: 0;
  }
  .step-item.done:not(:last-child)::after { background: var(--burgundy); }
  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; color: var(--gray);
    position: relative; z-index: 1;
    transition: all 0.3s;
  }
  .step-item.active .step-num { border-color: var(--burgundy); background: var(--burgundy); color: var(--white); }
  .step-item.done .step-num { border-color: var(--burgundy); background: var(--burgundy); color: var(--white); }
  .step-label { font-size: 10px; color: var(--gray); margin-top: 4px; text-align: center; }
  .step-item.active .step-label { color: var(--burgundy); font-weight: 500; }

  /* カード */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.75rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--black);
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--burgundy);
    display: inline-block;
  }

  /* フォーム要素 */
  .field { margin-bottom: 1.25rem; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray);
    margin-bottom: 6px;
    letter-spacing: 0.03em;
  }
  .field label span { color: var(--wine); margin-left: 2px; }
  input[type="text"], input[type="url"], textarea, select {
    width: 100%;
    padding: 10px 13px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--white);
    color: var(--black);
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--burgundy); }
  textarea { resize: none; height: 80px; line-height: 1.6; }

  /* URLフェッチボタン */
  .url-row { display: flex; gap: 8px; }
  .url-row input { flex: 1; }
  .fetch-btn {
    padding: 10px 16px;
    background: var(--burgundy);
    color: var(--white);
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .fetch-btn:hover { opacity: 0.85; }
  .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .fetch-note { font-size: 11px; color: var(--gray); margin-top: 5px; }
  .fetch-success { font-size: 11px; color: #2c7a4b; margin-top: 5px; }

  /* チェックボックスグリッド */
  .check-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .check-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
  }
  .check-item:hover { border-color: var(--burgundy); background: var(--light-red); }
  .check-item input[type="checkbox"] { accent-color: var(--burgundy); width: 14px; height: 14px; }
  .check-item.checked { border-color: var(--burgundy); background: var(--light-red); }

  /* トーン選択 */
  .tone-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .tone-btn {
    padding: 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--white); color: var(--black); font-size: 13px;
    cursor: pointer; text-align: center; font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .tone-btn.active { border-color: var(--burgundy); background: var(--light-red); color: var(--burgundy); font-weight: 500; }

  /* 言語選択 */
  .lang-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  /* ナビボタン */
  .nav-row { display: flex; gap: 10px; margin-top: 1.5rem; }
  .btn-primary {
    flex: 1; padding: 13px;
    background: var(--burgundy); color: var(--white);
    border: none; border-radius: 6px;
    font-size: 15px; font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-secondary {
    padding: 13px 20px;
    background: var(--white); color: var(--gray);
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }

  /* 完了画面 */
  .result-card {
    background: var(--white); border: 1px solid var(--border); border-radius: 8px;
    padding: 2rem; text-align: center;
  }
  .result-icon { font-size: 48px; margin-bottom: 1rem; }
  .result-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--black); margin-bottom: 0.5rem; }
  .result-sub { font-size: 13px; color: var(--gray); margin-bottom: 1.5rem; }
  .url-box {
    background: var(--light); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px 16px; font-size: 13px; color: var(--burgundy);
    font-family: monospace; word-break: break-all; margin-bottom: 1rem;
    text-align: left;
  }
  .copy-url-btn {
    width: 100%; padding: 12px;
    background: var(--burgundy); color: var(--white);
    border: none; border-radius: 6px;
    font-size: 14px; font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; margin-bottom: 10px;
  }
  .open-btn {
    width: 100%; padding: 12px;
    background: var(--white); color: var(--burgundy);
    border: 1px solid var(--burgundy); border-radius: 6px;
    font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }
  .restart-btn {
    margin-top: 10px; width: 100%; padding: 10px;
    background: none; color: var(--gray);
    border: none; font-size: 13px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .error-msg { font-size: 12px; color: var(--wine); margin-top: 5px; }

  /* ステップ表示制御 */
  .step-content { display: none; }
  .step-content.active { display: block; }

  /* 自動入力バッジ */
  .auto-badge {
    display: inline-block; background: #e8f5e9; color: #2c7a4b;
    font-size: 10px; padding: 2px 6px; border-radius: 99px;
    margin-left: 6px; font-weight: 500;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">asChronos</div>
  <div class="header-sub">Instagram キャプションツール　セットアップ</div>
</div>

<div class="main">
  <h1 class="page-title">あなた専用ツールを作る</h1>
  <p class="page-sub">お店・会社の情報を入力するだけで、Instagram投稿に特化したキャプション生成ツールが完成します。<br>所要時間：約3分</p>

  <!-- ステッパー -->
  <div class="stepper" id="stepper">
    <div class="step-item active" id="s1"><div class="step-num">1</div><div class="step-label">基本情報</div></div>
    <div class="step-item" id="s2"><div class="step-num">2</div><div class="step-label">コンセプト</div></div>
    <div class="step-item" id="s3"><div class="step-num">3</div><div class="step-label">投稿スタイル</div></div>
    <div class="step-item" id="s4"><div class="step-num">4</div><div class="step-label">完了</div></div>
  </div>

  <!-- STEP 1：基本情報 -->
  <div class="step-content active" id="step1">
    <div class="card">
      <div class="card-title">基本情報</div>

      <div class="field">
        <label>お店・会社名<span>*</span></label>
        <input type="text" id="name" placeholder="例：Est!prossimo / 伊勢豊不動産">
      </div>

      <div class="field">
        <label>業種<span>*</span></label>
        <select id="industry">
          <option value="">選択してください</option>
          <option value="restaurant">飲食店・カフェ・バー</option>
          <option value="clinic">クリニック・歯科・医療</option>
          <option value="realestate">不動産・建設</option>
          <option value="legal">士業（法律・税務・行政書士）</option>
          <option value="outdoor">釣り・アウトドア・スポーツ</option>
          <option value="beauty">美容・サロン・ネイル</option>
          <option value="retail">小売・EC・ショップ</option>
          <option value="lifestyle">ライフスタイル・個人</option>
          <option value="other">その他</option>
        </select>
      </div>

      <div class="field">
        <label>WebサイトURL（入力すると情報を自動取得）</label>
        <div class="url-row">
          <input type="url" id="website" placeholder="https://www.example.com">
          <button class="fetch-btn" id="fetch-btn" onclick="fetchWebsite()">自動取得</button>
        </div>
        <div class="fetch-note">※ サイトからコンセプト・特徴を自動で読み込みます</div>
        <div id="fetch-status"></div>
      </div>

      <div class="field">
        <label>Instagram URL</label>
        <input type="url" id="instagram" placeholder="https://www.instagram.com/アカウント名">
      </div>

      <div class="error-msg" id="err1"></div>
      <div class="nav-row">
        <button class="btn-primary" onclick="goStep(2)">次へ →</button>
      </div>
    </div>
  </div>

  <!-- STEP 2：コンセプト -->
  <div class="step-content" id="step2">
    <div class="card">
      <div class="card-title">コンセプト・特徴</div>

      <div class="field">
        <label>キャッチコピー・売り <span id="auto1"></span></label>
        <input type="text" id="catchcopy" placeholder="例：千産千消がテーマの千葉のイタリアン">
      </div>

      <div class="field">
        <label>お店・会社のこだわり・特徴 <span id="auto2"></span></label>
        <textarea id="features" placeholder="例：契約農家から直送の野菜、旬の魚介を使用。グラスワインは常時20種以上。食べログ百名店選出。"></textarea>
      </div>

      <div class="field">
        <label>よく投稿するカテゴリ（複数選択可）</label>
        <div class="check-grid" id="category-grid">
          <label class="check-item" onclick="toggleCheck(this)">
            <input type="checkbox" value="料理・ドリンク"> 料理・ドリンク
          </label>
          <label class="check-item" onclick="toggleCheck(this)">
            <input type="checkbox" value="物件・案件紹介"> 物件・案件紹介
          </label>
          <label class="check-item" onclick="toggleCheck(this)">
            <input type="checkbox" value="スタッフ紹介"> スタッフ紹介
          </label>
          <label class="check-item" onclick="toggleCheck(this)">
            <input type="checkbox" value="季節のお知らせ"> 季節のお知らせ
          </label>
          <label class="check-item" onclick="toggleCheck(this)">
            <input type="checkbox" value="実績・事例紹介"> 実績・事例紹介
          </label>
          <label class="check-item" onclick="toggleCheck(this)">
            <input type="checkbox" value="釣果・アウトドア報告"> 釣果・アウトドア報告
          </label>
          <label class="check-item" onclick="toggleCheck(this)">
            <input type="checkbox" value="日常・裏側"> 日常・裏側
          </label>
          <label class="check-item" onclick="toggleCheck(this)">
            <input type="checkbox" value="イベント・お知らせ"> イベント・お知らせ
          </label>
        </div>
      </div>

      <div class="field">
        <label>必須ハッシュタグ（スペース区切り）</label>
        <input type="text" id="hashtags" placeholder="例：#千葉グルメ #イタリアン #エストプロッシモ">
      </div>

      <div class="error-msg" id="err2"></div>
      <div class="nav-row">
        <button class="btn-secondary" onclick="goStep(1)">← 戻る</button>
        <button class="btn-primary" onclick="goStep(3)">次へ →</button>
      </div>
    </div>
  </div>

  <!-- STEP 3：投稿スタイル -->
  <div class="step-content" id="step3">
    <div class="card">
      <div class="card-title">投稿スタイル</div>

      <div class="field">
        <label>トーンの好み</label>
        <div class="tone-grid">
          <button class="tone-btn active" onclick="selectTone(this,'カジュアル・親しみやすく')">カジュアル</button>
          <button class="tone-btn" onclick="selectTone(this,'上品・丁寧に')">上品・丁寧</button>
          <button class="tone-btn" onclick="selectTone(this,'食欲・購買欲をそそる表現で')">食欲・購買欲そそる</button>
          <button class="tone-btn" onclick="selectTone(this,'ストーリー・背景を大切にして')">ストーリー風</button>
          <button class="tone-btn" onclick="selectTone(this,'プロフェッショナルで信頼感のある')">プロフェッショナル</button>
          <button class="tone-btn" onclick="selectTone(this,'さらっとシンプルに短く')">シンプル・短め</button>
        </div>
      </div>

      <div class="field">
        <label>対応言語</label>
        <div class="lang-grid">
          <button class="tone-btn active" onclick="selectLang(this,'ja')">日本語</button>
          <button class="tone-btn" onclick="selectLang(this,'en')">英語</button>
          <button class="tone-btn" onclick="selectLang(this,'ko')">韓国語</button>
          <button class="tone-btn" onclick="selectLang(this,'ja_en')">日本語＋英語</button>
          <button class="tone-btn" onclick="selectLang(this,'ja_ko')">日本語＋韓国語</button>
          <button class="tone-btn" onclick="selectLang(this,'ja_en_ko')">日英韓すべて</button>
        </div>
      </div>

      <div class="field">
        <label>その他・特記事項（任意）</label>
        <textarea id="notes" placeholder="例：ワインのペアリング提案を必ず含める、韓国語は大邱方言で、など"></textarea>
      </div>

      <div class="error-msg" id="err3"></div>
      <div class="nav-row">
        <button class="btn-secondary" onclick="goStep(2)">← 戻る</button>
        <button class="btn-primary" onclick="generateURL()">ツールを作成する</button>
      </div>
    </div>
  </div>

  <!-- STEP 4：完了 -->
  <div class="step-content" id="step4">
    <div class="result-card">
      <div class="result-icon">🎉</div>
      <h2 class="result-title">専用ツールが完成しました！</h2>
      <p class="result-sub">以下のURLをお客様にお渡しください</p>
      <div class="url-box" id="result-url"></div>
      <button class="copy-url-btn" onclick="copyURL()">URLをコピーする</button>
      <button class="open-btn" onclick="openURL()">ツールを開いて確認する</button>
      <button class="restart-btn" onclick="restart()">別のアカウントを作成する</button>
    </div>
  </div>

</div>

<script>
const PROXY_URL = 'https://caption-proxy.boston1215.workers.dev/';
let selectedTones = ['カジュアル・親しみやすく'];
let selectedLang = 'ja';
let generatedURL = '';
let fetchedInfo = '';

function goStep(n) {
  // バリデーション
  if (n === 2) {
    if (!document.getElementById('name').value.trim()) {
      document.getElementById('err1').textContent = 'お店・会社名を入力してください';
      return;
    }
    if (!document.getElementById('industry').value) {
      document.getElementById('err1').textContent = '業種を選択してください';
      return;
    }
    document.getElementById('err1').textContent = '';
  }

  // ステップ切り替え
  document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');

  // ステッパー更新
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('s' + i);
    el.classList.remove('active', 'done');
    if (i < n) el.classList.add('done');
    if (i === n) el.classList.add('active');
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleCheck(label) {
  const cb = label.querySelector('input[type="checkbox"]');
  cb.checked = !cb.checked;
  label.classList.toggle('checked', cb.checked);
}

function selectTone(btn, tone) {
  btn.classList.toggle('active');
  if (btn.classList.contains('active')) {
    if (!selectedTones.includes(tone)) selectedTones.push(tone);
  } else {
    selectedTones = selectedTones.filter(t => t !== tone);
    if (selectedTones.length === 0) {
      btn.classList.add('active');
      selectedTones.push(tone);
    }
  }
}

function selectLang(btn, lang) {
  document.querySelectorAll('.lang-grid .tone-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedLang = lang;
}

async function fetchWebsite() {
  const url = document.getElementById('website').value.trim();
  if (!url) { document.getElementById('fetch-status').innerHTML = '<span style="color:#c00">URLを入力してください</span>'; return; }

  const btn = document.getElementById('fetch-btn');
  btn.disabled = true;
  btn.textContent = '取得中…';
  document.getElementById('fetch-status').innerHTML = '';

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: `あなたはWebサイトの情報を分析して、Instagramキャプション生成に必要な情報を抽出する専門家です。
以下の形式でJSONのみ返してください（マークダウン不要）：
{"catchcopy":"キャッチコピーや売り（1文）","features":"お店・会社の特徴・こだわり（2〜3文）","hashtags":"#タグ1 #タグ2 #タグ3（3〜5個）"}`,
        messages: [{ role: 'user', content: `このWebサイトの情報を分析してください：${url}\n\nサイトにアクセスできない場合は、URLから読み取れる情報で推測してください。` }]
      })
    });

    const data = await res.json();
    const text = data.content.map(b => b.text || '').join('');
    const match = text.match(/\{[\s\S]*\}/);
    if (match) {
      const parsed = JSON.parse(match[0]);
      if (parsed.catchcopy) {
        document.getElementById('catchcopy').value = parsed.catchcopy;
        document.getElementById('auto1').innerHTML = '<span class="auto-badge">自動入力</span>';
      }
      if (parsed.features) {
        document.getElementById('features').value = parsed.features;
        document.getElementById('auto2').innerHTML = '<span class="auto-badge">自動入力</span>';
      }
      if (parsed.hashtags) {
        document.getElementById('hashtags').value = parsed.hashtags;
      }
      fetchedInfo = JSON.stringify(parsed);
      document.getElementById('fetch-status').innerHTML = '<span class="fetch-success">✓ 情報を自動取得しました。内容を確認・修正してください。</span>';
    }
  } catch(e) {
    document.getElementById('fetch-status').innerHTML = '<span style="color:#c00">取得できませんでした。手動で入力してください。</span>';
  }

  btn.disabled = false;
  btn.textContent = '自動取得';
}

async function generateURL() {
  const name = document.getElementById('name').value.trim();
  const industry = document.getElementById('industry').value;
  const website = document.getElementById('website').value.trim();
  const instagram = document.getElementById('instagram').value.trim();
  const catchcopy = document.getElementById('catchcopy').value.trim();
  const features = document.getElementById('features').value.trim();
  const hashtags = document.getElementById('hashtags').value.trim();
  const notes = document.getElementById('notes').value.trim();
  const categories = Array.from(document.querySelectorAll('#category-grid input:checked')).map(cb => cb.value);

  const config = {
    n: name, i: industry, w: website, ig: instagram,
    c: catchcopy, f: features, h: hashtags,
    cat: categories, tones: selectedTones, l: selectedLang, note: notes
  };

  const btn = document.querySelector('#step3 .btn-primary');
  btn.disabled = true;
  btn.textContent = '作成中…';

  try {
    const res = await fetch('https://caption-proxy.boston1215.workers.dev/save-config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config)
    });
    const data = await res.json();
    if (data.id) {
      generatedURL = `https://boston1215-hub.github.io/caption-tool/?id=${data.id}`;
      document.getElementById('result-url').textContent = generatedURL;
      goStep(4);
    } else {
      document.getElementById('err3').textContent = '保存に失敗しました。もう一度お試しください。';
    }
  } catch(e) {
    document.getElementById('err3').textContent = 'エラー：' + e.message;
  }

  btn.disabled = false;
  btn.textContent = 'ツールを作成する';
}

function copyURL() {
  navigator.clipboard.writeText(generatedURL).then(() => {
    const btn = document.querySelector('.copy-url-btn');
    btn.textContent = 'コピーしました！';
    setTimeout(() => btn.textContent = 'URLをコピーする', 2000);
  });
}

function openURL() {
  window.open(generatedURL, '_blank');
}

function restart() {
  document.getElementById('name').value = '';
  document.getElementById('industry').value = '';
  document.getElementById('website').value = '';
  document.getElementById('instagram').value = '';
  document.getElementById('catchcopy').value = '';
  document.getElementById('features').value = '';
  document.getElementById('hashtags').value = '';
  document.getElementById('notes').value = '';
  document.getElementById('fetch-status').innerHTML = '';
  document.getElementById('auto1').innerHTML = '';
  document.getElementById('auto2').innerHTML = '';
  document.querySelectorAll('#category-grid input').forEach(cb => { cb.checked = false; cb.closest('label').classList.remove('checked'); });
  selectedTones = ['カジュアル・親しみやすく'];
  selectedLang = 'ja';
  document.querySelectorAll('.tone-grid .tone-btn').forEach((btn, i) => { btn.classList.toggle('active', i === 0); });
  document.querySelectorAll('.lang-grid .tone-btn').forEach((btn, i) => { btn.classList.toggle('active', i === 0); });
  goStep(1);
}
</script>
</body>
</html>
